name: Playwright

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'playwright/**'
      - 'package-lock.json'
      - 'playwright.config.ts'
      - '.github/workflows/playwright.yml'
  workflow_dispatch:

jobs:
  e2e:
    name: ${{ matrix.jobName }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            jobName: E2E (Playwright, chromium)
            workers: 2
            shardIndex: 1
            shardTotal: 1
          - browser: webkit
            jobName: E2E (Playwright, webkit, shard 1/3)
            workers: 1
            shardIndex: 1
            shardTotal: 3
          - browser: webkit
            jobName: E2E (Playwright, webkit, shard 2/3)
            workers: 1
            shardIndex: 2
            shardTotal: 3
          - browser: webkit
            jobName: E2E (Playwright, webkit, shard 3/3)
            workers: 1
            shardIndex: 3
            shardTotal: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.1

      - name: Setup Node
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '24.14.0'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check Types
        run: npm run check-types

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ matrix.browser }}-

      - name: Install Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright Tests
        env:
          CI: 'true'
        run: |
          SHARD_ARGS=''
          if [ '${{ matrix.shardTotal }}' != '1' ]; then
            SHARD_ARGS="--shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
          fi
          npm run test:e2e -- --project=${{ matrix.browser }} --workers=${{ matrix.workers }} $SHARD_ARGS

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6.0.0
        if: ${{ failure() }}
        with:
          name: playwright-report-${{ matrix.browser }}-${{ matrix.shardIndex }}of${{ matrix.shardTotal }}
          path: playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright test results
        uses: actions/upload-artifact@v6.0.0
        if: ${{ failure() }}
        with:
          name: test-results-${{ matrix.browser }}-${{ matrix.shardIndex }}of${{ matrix.shardTotal }}
          path: test-results
          if-no-files-found: ignore
